<script>
    // load scramjet globally :tongue:
    const { ScramjetController } = $scramjetLoadController();

    const scramjet = new ScramjetController({
        files: {
            wasm: "/science/scramjet.wasm.wasm",
            all: "/science/scramjet.all.js",
            sync: "/science/scramjet.sync.js",
        },
        prefix: "/*/%/"
    });
    window.scramjet = scramjet;

    scramjet.init();

    if (window.navigator) {
        navigator.serviceWorker.register("/scripts/sw.js", { scope: "/*/%/" });
    }
    //

    // make req for adding url to links db
    (async () => {
        try {
            console.log("Attempting to add url to links db.")
            let res = await fetch("/urls/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ "url": window.location.origin })
            });
            if (res.status === 409) {
                console.log("Url already in db.")
            }
        } catch (e) {
            console.error(e);
        }
        try { // no, this isn't for tracking, its for nowgg.fun
            let res = await fetch("/ip");
            let ip = await res.text();
            localStorage.setItem("__ip", ip);
        } catch (e) {
            console.error(e);
        }
    })()
    //
</script>
